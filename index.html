    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Host Grotesk', sans-serif;
            background-color: #ccc;
            background-image: linear-gradient(transparent, #eee);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #242424;
        }

        /* --- INITIAL STATE: Drop Zone --- */
        #drop-zone-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        @keyframes dropZoneFade {
            0%, 100% { opacity: 0.8; transform: scale(0.995); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 300% 50%; }
            100% { background-position: 0% 50%; }
        }

        #drop-zone {
            width: 100%;
            height: 100%;
            border: 3px dashed rgba(0,0,0,.15);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: dropZoneFade 3s infinite ease-in-out;
        }
        
        #drop-zone:hover {
            background-color: rgba(255,255,255,.075);
            border-color: rgba(0,0,0,.25);
            transform: scale(1.01);
            animation-play-state: paused; /* Pause fade on hover */
            opacity: 1;
        }

        #drop-zone.dragover {
            background-color: rgba(255,255,255,.1);
            border-color: rgba(0,0,0,.25);
            transform: scale(1.025);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            animation: none; /* Stop fade entirely when dragging */
            opacity: 1;
        }

        h1, h2 {
            background: linear-gradient(270deg, #aaa, #bbb, #aaa);
            background-size: 200% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            animation: textGradient 5s ease infinite;
            margin: 0;
        }

        h1{
            font-size: 26px;
            font-weight: 500;
        }
        h2{
            font-size: 20px;
            font-weight: 400;
        }

        /* --- PRESENTER VIEW --- */
        #presenter-view {
            flex-grow: 1;
            display: none; /* Hidden initially */
            padding: 40px;
            gap: 40px;
            height: calc(100vh - 60px); /* Leave room for footer */
        }
        
        .col-left {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .col-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .preview-container {
            width: 100%;
            background: #000;
            border-radius: 12px;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .preview-container:hover {
            transform: scale(1.02);
        }

        .preview-container::after {
            content: "Next Page";
            position: absolute;
            bottom: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .preview-container:hover::after {
            opacity: 1;
        }

        /* Canvas styling to fit containers neatly */
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keep aspect ratio intact without cropping */
        }

        /* Labels over black boxes for initial render visual */
        .overlay-label {
            position: absolute;
            color: white;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
        }
        #next-page-label { font-size: 24px; }

        /* --- CONTROLS --- */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: end;
            gap: 12px;
            background: transparent;
            padding: 10px 0;
        }

        .btn-circle {
            width: 35px;

            border-radius: 50%;

            display: flex;

        .btn-circle:hover { transform: scale(1.05); }

        /* --- LIVE VIEW (OBS/Receiver) --- */
        #live-view {
            display: none;

            transition: color .5s ease;
        }
        footer a:hover {
            color: #000;

<body>

    <!-- STATE 1: Drop Zone -->
    <div id="drop-zone-container">
        <div id="drop-zone">
            <h1>Drop a PDF File</h1>
            <h2>or click to browse</h2>
        </div>
        <input type="file" id="file-input" style="display:none" accept="application/pdf">
    </div>

    <!-- STATE 2: Presenter View -->
    <div id="presenter-view">
        <div class="col-left">
            <span class="overlay-label" id="current-page-label">Page 1</span>
            <canvas id="current-canvas"></canvas>
        </div>
        
        <div class="col-right">
            <div id="clock-wrapper"></div>
            <div class="preview-container" id="next-page-container">
                <span class="overlay-label" id="next-page-label">Page 2</span>
                <canvas id="next-canvas"></canvas>
            </div>
            
            <div class="controls-row">
                <button class="btn-circle" id="btn-swap" title="Swap to Live (Shortcut: Q)">🕹️</button>
                <button class="btn-circle" id="btn-present" title="Present (Shortcut: P)">▶</button>
                <select class="page-selector" id="page-select" title="Go to Page"></select>
                <button class="btn-circle" id="btn-blackout" title="Blackout (Shortcut: Z)"></button>
                <button class="btn-circle" id="btn-blank" title="Blank (Shortcut: X)"></button>
            </div>
        </div>
    </div>

    <footer>
        Codecrafted by&nbsp;<a href="https://stefanus.hosea.id" target="_blank">Stefanus Hosea</a>&nbsp;• v2026.07.09.001
    </footer>

    <!-- STATE 3: Live View (OBS/Receiver) -->
    <div id="live-view">
        <img id="live-img" />
        <div id="live-overlay"></div>
    </div>

    <script>
        // Set worker source for PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Check Mode (Broadcaster vs Receiver)
        const urlParams = new URLSearchParams(window.location.search);
        const isLiveMode = urlParams.get('mode') === 'live';
        const bc = new BroadcastChannel('playdf_channel');

        // Core variables
        let pdfDoc = null;
        let pageNum = 1;
        let isRendering = false;
        let pageNumPending = null;
        let liveWindow = null;
        let overlayState = 'none'; // 'none', 'black', 'white', 'green'
        let currentFileName = 'Live Presentation';

        // DOM Elements
        const dropZoneContainer = document.getElementById('drop-zone-container');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const presenterView = document.getElementById('presenter-view');
        
        const currentCanvas = document.getElementById('current-canvas');
        const nextCanvas = document.getElementById('next-canvas');
        const nextContainer = document.getElementById('next-page-container');
        
        const currentLabel = document.getElementById('current-page-label');
        const nextLabel = document.getElementById('next-page-label');
        
        const pageSelect = document.getElementById('page-select');
        const btnSwap = document.getElementById('btn-swap');
        const btnPresent = document.getElementById('btn-present');
        const btnBlackout = document.getElementById('btn-blackout');
        const btnBlank = document.getElementById('btn-blank');

        if (isLiveMode) {
            // ==========================================
            // RECEIVER MODE (Popups & Chrome Projectors)
            // ==========================================
            document.body.style.background = 'transparent';
            document.getElementById('drop-zone-container').style.display = 'none';
            document.getElementById('presenter-view').style.display = 'none';
            document.querySelector('footer').style.display = 'none';
            document.getElementById('live-view').style.display = 'block';

            const liveImg = document.getElementById('live-img');
            const liveOverlay = document.getElementById('live-overlay');

            bc.onmessage = (e) => {
                const msg = e.data;
                if (msg.type === 'render') {
                    if (liveImg.src && liveImg.src !== window.location.href) {
                        const clone = liveImg.cloneNode();
                        clone.style.position = 'absolute';
                        clone.style.top = '0';
                        clone.style.left = '0';
                        clone.style.zIndex = '5';
                        clone.style.transition = 'opacity 0.5s ease';
                        liveImg.parentElement.appendChild(clone);
                        
                        liveImg.src = msg.data;
                        void clone.offsetWidth; // trigger reflow
                        
                        clone.style.opacity = '0';
                        setTimeout(() => clone.remove(), 500);
                    } else {
                        liveImg.src = msg.data;
                    }
                    if (msg.fileName) document.title = msg.fileName;
                } else if (msg.type === 'overlay') {
                    if (msg.state === 'black') {
                        liveOverlay.style.backgroundColor = '#000';
                        liveOverlay.style.opacity = '1';
                        liveOverlay.style.pointerEvents = 'auto';
                    } else if (msg.state === 'white') {
                        liveOverlay.style.backgroundColor = '#fff';
                        liveOverlay.style.opacity = '1';
                        liveOverlay.style.pointerEvents = 'auto';
                    } else {
                        liveOverlay.style.opacity = '0';
                        liveOverlay.style.pointerEvents = 'none';
                    }
                } else if (msg.type === 'command_close') {
                    window.close();
                } else if (msg.type === 'command_fullscreen') {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(()=>{});
                    } else {
                        document.exitFullscreen().catch(()=>{});
                    }
                }
            };

            // Request state on initial load
            bc.postMessage({ type: 'request_state' });

            // Forward interactions back to broadcaster
            document.addEventListener('click', () => bc.postMessage({ type: 'input_click' }));
            document.addEventListener('keydown', (e) => bc.postMessage({ type: 'input_keydown', key: e.key }));

        } else {
            // ==========================================
            // BROADCASTER MODE (Main Program)
            // ==========================================

            let isLocalLiveMode = false;

            // Handle incoming requests from Live windows
            bc.onmessage = (e) => {
                const msg = e.data;
                if (msg.type === 'request_state') {
                    if (currentCanvas.width > 0) {
                        bc.postMessage({ 
                            type: 'render', 
                            data: currentCanvas.toDataURL('image/png'),
                            fileName: currentFileName
                        });
                    }
                    bc.postMessage({ type: 'overlay', state: overlayState });
                } else if (msg.type === 'input_click') {
                    goNextPage();
                } else if (msg.type === 'input_keydown') {
                    handleKeydown({ key: msg.key, preventDefault: () => {} }, true);
                }
            };

            // --- CLOCK LOGIC ---
            let lastTimeStr = "";
            
            function updateClock() {
                const now = new Date();
                // Forces exactly 8 characters format (e.g. "09:05:02")
                const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                if (timeStr !== lastTimeStr) {
                    const wrapper = document.getElementById('clock-wrapper');
                    
                    if (wrapper.children.length === 0) {
                        // Initial render: create a separate span for each character
                        for(let char of timeStr) {
                            let span = document.createElement('span');
                            span.textContent = char;
                            wrapper.appendChild(span);
                        }
                    } else {
                        // Update only the specific characters that changed to prevent static text from flickering
                        for(let i = 0; i < timeStr.length; i++) {
                            if (wrapper.children[i].textContent !== timeStr[i]) {
                                const span = wrapper.children[i];
                                span.style.animation = 'none';
                                span.textContent = timeStr[i];
                                
                                // Trigger reflow to restart animation seamlessly
                                void span.offsetWidth; 
                                
                                span.style.animation = 'digitFade 0.4s ease-out forwards';
                            }
                        }
                    }
                    lastTimeStr = timeStr;
                }
            }
            setInterval(updateClock, 1000);
            updateClock(); // Initial call

            // --- 1. INITIALIZATION & FILE HANDLING ---

            // Click to browse
            dropZone.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file && file.type === "application/pdf") {
                    loadPDFFile(file);
                }
            });

            // Drag & Drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if(file && file.type === "application/pdf") {
                    loadPDFFile(file);
                } else {
                    alert("Please drop a valid PDF file.");
                }
            });

            // Read file and parse with PDF.js
            function loadPDFFile(file) {
                currentFileName = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const typedarray = new Uint8Array(e.target.result);
                    
                    // Fade out transition for seamless state change
                    dropZoneContainer.style.transition = 'opacity 0.4s ease';
                    dropZoneContainer.style.opacity = '0';
                    
                    setTimeout(() => {
                        // Switch UI State
                        dropZoneContainer.style.display = 'none';
                        presenterView.style.opacity = '0';
                        presenterView.style.display = 'flex';
                        
                        // Force reflow
                        void presenterView.offsetWidth;
                        presenterView.style.transition = 'opacity 0.4s ease';
                        presenterView.style.opacity = '1';
                        
                        pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                            pdfDoc = pdf;
                            pageNum = 1;
                            
                            // Setup Dropdown
                            pageSelect.innerHTML = '';
                            for(let i = 1; i <= pdfDoc.numPages; i++) {
                                const opt = document.createElement('option');
                                opt.value = i;
                                opt.textContent = `Page ${i}`;
                                pageSelect.appendChild(opt);
                            }
                            
                            // Initial Render
                            queueRenderPage(pageNum);
                        }).catch(err => {
                            alert("Error loading PDF: " + err.message);
                            resetUI();
                        });
                    }, 400);
                };
                reader.readAsArrayBuffer(file);
            }

            function resetUI() {
                presenterView.style.transition = 'opacity 0.4s ease';
                presenterView.style.opacity = '0';
                setTimeout(() => {
                    presenterView.style.display = 'none';
                    dropZoneContainer.style.display = 'flex';
                    void dropZoneContainer.offsetWidth;
                    dropZoneContainer.style.opacity = '1';
                    pdfDoc = null;
                }, 400);
            }


            // --- 2. RENDER LOGIC ---

            function renderPageCanvas(num, canvasElement, isMain = false) {
                // Snapshot current canvas for smooth crossfade transition
                let clone = null;
                if (canvasElement.width > 0 && canvasElement.height > 0) {
                    clone = document.createElement('canvas');
                    clone.width = canvasElement.width;
                    clone.height = canvasElement.height;
                    const cloneCtx = clone.getContext('2d');
                    cloneCtx.drawImage(canvasElement, 0, 0);
                    
                    clone.style.position = 'absolute';
                    clone.style.top = '0';
                    clone.style.left = '0';
                    clone.style.width = '100%';
                    clone.style.height = '100%';
                    clone.style.objectFit = 'contain';
                    clone.style.transition = 'opacity 0.5s ease';
                    clone.style.pointerEvents = 'none';
                    clone.style.zIndex = '5';
                    
                    canvasElement.parentElement.appendChild(clone);
                }

                return pdfDoc.getPage(num).then(page => {
                    // High-res render scale for crispness, CSS scales it down
                    const scale = 2.5; 
                    const viewport = page.getViewport({scale: scale});
                    
                    canvasElement.height = viewport.height;
                    canvasElement.width = viewport.width;
                    
                    const ctx = canvasElement.getContext('2d');
                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    
                    return page.render(renderContext).promise.then(() => {
                        // Fade out the snapshot after new render is complete
                        if (clone) {
                            requestAnimationFrame(() => {
                                clone.style.opacity = '0';
                                setTimeout(() => {
                                    if (clone.parentNode) clone.parentNode.removeChild(clone);
                                }, 500);
                            });
                        }
                    });
                });
            }

            function renderPage(num) {
                isRendering = true;
                
                // Render Current Page
                renderPageCanvas(num, currentCanvas, true).then(() => {
                    currentLabel.style.display = 'none'; // Hide text placeholder
                    syncLiveWindow(); // Broadcast to live windows
                    
                    // Render Next Page (if exists)
                    if (num < pdfDoc.numPages) {
                        renderPageCanvas(num + 1, nextCanvas).then(() => {
                            nextLabel.style.display = 'none';
                            finishRender();
                        });
                    } else {
                        // Clear next page canvas if we are at the end
                        const ctx = nextCanvas.getContext('2d');
                        ctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
                        nextLabel.textContent = "End of Document";
                        nextLabel.style.display = 'block';
                        finishRender();
                    }
                });
                
                // Update dropdown
                pageSelect.value = num;
            }

            function finishRender() {
                isRendering = false;
                if (pageNumPending !== null) {
                    renderPage(pageNumPending);
                    pageNumPending = null;
                }
            }

            function queueRenderPage(num) {
                if (isRendering) {
                    pageNumPending = num;
                } else {
                    renderPage(num);
                }
            }

            function goNextPage() {
                if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
                pageNum++;
                queueRenderPage(pageNum);
            }

            function goPrevPage() {
                if (!pdfDoc || pageNum <= 1) return;
                pageNum--;
                queueRenderPage(pageNum);
            }

            // --- 3. LIVE POPUP & IPC LOGIC ---

            function openLiveWindow() {
                const targetUrl = window.location.origin + window.location.pathname + '?mode=live';
                // standard window.open falls back gracefully to a synced broadcast window
                liveWindow = window.open(targetUrl, 'PlayDF_Live', 'width=1280,height=720,menubar=no,toolbar=no,location=no,status=no,resizable=yes');
            }

            function syncLiveWindow() {
                if (currentCanvas.width > 0) {
                    // Delay slightly to prevent blocking UI animations
                    setTimeout(() => {
                        const data = currentCanvas.toDataURL('image/png');
                        bc.postMessage({ type: 'render', data: data, fileName: currentFileName });
                        
                        // Local swap sync
                        if (isLocalLiveMode) {
                            const liveImg = document.getElementById('live-img');
                            if (liveImg.src && liveImg.src !== window.location.href) {
                                const clone = liveImg.cloneNode();
                                clone.style.position = 'absolute';
                                clone.style.top = '0';
                                clone.style.left = '0';
                                clone.style.zIndex = '5';
                                clone.style.transition = 'opacity 0.5s ease';
                                liveImg.parentElement.appendChild(clone);
                                
                                liveImg.src = data;
                                void clone.offsetWidth; // trigger reflow
                                
                                clone.style.opacity = '0';
                                setTimeout(() => clone.remove(), 500);
                            } else {
                                liveImg.src = data;
                            }
                        }
                    }, 50);
                }
            }

            function toggleOverlay(type) {
                if (overlayState === type) {
                    overlayState = 'none'; // Toggle off
                } else {
                    overlayState = type; // Set to black or white
                }
                
                // Update button visual states
                btnBlackout.classList.toggle('active', overlayState === 'black');
                btnBlank.classList.toggle('active', overlayState === 'white');
                
                applyOverlayState();
            }

            function applyOverlayState() {
                bc.postMessage({ type: 'overlay', state: overlayState });
                
                // Local swap sync
                const liveOverlay = document.getElementById('live-overlay');
                if (overlayState === 'black') {
                    liveOverlay.style.backgroundColor = '#000';
                    liveOverlay.style.opacity = '1';
                    liveOverlay.style.pointerEvents = 'auto';
                } else if (overlayState === 'white') {
                    liveOverlay.style.backgroundColor = '#fff';
                    liveOverlay.style.opacity = '1';
                    liveOverlay.style.pointerEvents = 'auto';
                } else {
                    liveOverlay.style.opacity = '0';
                    liveOverlay.style.pointerEvents = 'none';
                }
            }

            function toggleFullScreen() {
                // Force OBS / Popup into full screen via broadcast
                bc.postMessage({ type: 'command_fullscreen' });
            }

            function toggleLocalLive() {
                isLocalLiveMode = !isLocalLiveMode;
                const liveView = document.getElementById('live-view');
                
                if (isLocalLiveMode) {
                    liveView.style.background = '#000'; // Make background solid black to hide presenter interface
                    liveView.style.display = 'block';
                    
                    // Force an immediate sync of current image and overlay
                    const localLiveImg = document.getElementById('live-img');
                    localLiveImg.src = currentCanvas.toDataURL('image/png');
                    applyOverlayState();
                    
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(()=>{});
                    }
                } else {
                    liveView.style.display = 'none';
                    if (document.fullscreenElement) {
                        document.exitFullscreen().catch(()=>{});
                    }
                }
            }

            // --- 4. EVENT LISTENERS ---

            // UI Clicks
            nextContainer.addEventListener('click', goNextPage);
            
            pageSelect.addEventListener('change', (e) => {
                pageNum = parseInt(e.target.value);
                queueRenderPage(pageNum);
                e.target.blur(); // Remove focus to re-enable keyboard shortcuts instantly
            });

            btnSwap.addEventListener('click', toggleLocalLive);
            btnPresent.addEventListener('click', openLiveWindow);
            btnBlackout.addEventListener('click', () => toggleOverlay('black'));
            btnBlank.addEventListener('click', () => toggleOverlay('white'));

            // Keyboard Shortcuts Handler
            function handleKeydown(e, isPopup = false) {
                // Ignore if in input/textarea (not applicable here, but good practice)
                if(e && e.target && e.target.tagName) {
                    if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                }
                
                // Only capture if PDF is loaded
                if (!pdfDoc) return;

                const k = e.key;
                
                // Next Page
                if (['a', 'A', ' ', 'ArrowDown', 'ArrowRight'].includes(k)) {
                    if (e.preventDefault) e.preventDefault();
                    goNextPage();
                } 
                // Prev Page
                else if (['ArrowUp', 'ArrowLeft'].includes(k)) {
                    if (e.preventDefault) e.preventDefault();
                    goPrevPage();
                }
                // Present (Exclude on Popup)
                else if (['p', 'P'].includes(k) && !isPopup) {
                    if (e.preventDefault) e.preventDefault();
                    openLiveWindow();
                }
                // Blackout
                else if (['z', 'Z'].includes(k)) {
                    if (e.preventDefault) e.preventDefault();
                    toggleOverlay('black');
                }
                // Blank
                else if (['x', 'X'].includes(k)) {
                    if (e.preventDefault) e.preventDefault();
                    toggleOverlay('white');
                }
                // Swap to local Live
                else if (['q', 'Q'].includes(k)) {
                    if (e.preventDefault) e.preventDefault();
                    toggleLocalLive();
                }
                // Fullscreen Popup
                else if (['f', 'F'].includes(k)) {
                    if (e.preventDefault) e.preventDefault();
                    toggleFullScreen();
                }
                // Refresh and Reset
                else if (['r', 'R'].includes(k)) {
                    if (e.preventDefault) e.preventDefault();
                    bc.postMessage({ type: 'command_close' });
                    window.location.reload(); 
                }
            }

            // Apply to main window
            document.addEventListener('keydown', (e) => handleKeydown(e, false));
            
            // Listen for native exit from full screen
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement && isLocalLiveMode) {
                    toggleLocalLive();
                }
            });
        
        } // End of ELSE (Broadcaster block)
    </script>
</body>
</html>
