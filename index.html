    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Host Grotesk', sans-serif;
            background-color: #ccc;
            background-image: linear-gradient(transparent, #eee);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #242424;
        }

        /* --- GLOBAL DRAG OVERLAY --- */
        #global-drop-overlay {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0) 0%, #000 100%);
            background-color: rgba(0,0,0,0.75);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.75);
            backdrop-filter: blur(5px);
        }
        #global-drop-overlay div {
            max-width: 80%;
            border: 3px dashed rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 5vw 5vh;
            text-align: center;
            font-size: 26px;
            font-weight: 500;
            line-height: 1.1;
            pointer-events: none;
        }

        /* --- INITIAL STATE: Drop Zone --- */
        #drop-zone-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 35px;
        }

        @keyframes dropZoneFade {
            0%, 100% { opacity: 0.8; transform: scale(0.995); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 300% 50%; }
            100% { background-position: 0% 50%; }
        }

        #drop-zone {
            width: 100%;
            height: 100%;
            border: 3px dashed rgba(255,255,255,.75);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 0px 100px rgba(255,255,255,0.75);
            animation: dropZoneFade 3s infinite ease-in-out;
        }
        
        #drop-zone:hover {
            background-color: rgba(255,255,255,.15);
            border-color: rgb(255,255,255);
            animation-play-state: paused;
            opacity: 1;
        }

        h1, h2 {
            background: linear-gradient(270deg, #666, #888, #666);
            background-size: 200% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            animation: textGradient 5s ease infinite;
            margin: 0;
            text-align: center;
            line-height: 1.1;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        #drop-zone:hover h1, #drop-zone:hover h2 {
            opacity: 0.75;
        }

        h1{
            font-size: 26px;
            font-weight: 500;
        }
        h2{
            font-size: 20px;
            font-weight: 400;
        }

        /* --- PRESENTER VIEW --- */
        #presenter-view {
            flex-grow: 1;
            display: none;
            padding: 40px;
            gap: 40px;
            height: calc(100dvh - 60px);
        }
        
        .col-left {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .col-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        /* Main View Elements */
        .main-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            inset: 0;
            display: none;
        }

        .preview-container {
            width: 100%;
            background: #000;
            border-radius: 12px;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .preview-container:hover {
            transform: scale(1.02);
        }

        .preview-container::after {
            content: "Next Page";
            position: absolute;
            bottom: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .preview-container:hover::after {
            opacity: 1;
        }

        canvas.preview-canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Labels over black boxes for initial render visual */
        .overlay-label {
            position: absolute;
            color: white;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
        }
        #next-page-label { font-size: 24px; }

        /* --- PPTX PROGRESS --- */
        #pptx-progress {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 0 15%;
            pointer-events: none;
        }
        #pptx-progress-text {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            font-weight: 400;
            font-variant-numeric: tabular-nums;
        }
        #pptx-progress-track {
            width: 100%;
            max-width: 360px;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
        }
        #pptx-progress-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            border-radius: 3px;
            transition: width 0.2s ease;
        }
        #pptx-progress-track.indeterminate #pptx-progress-bar {
            width: 35%;
            transition: none;
            animation: pptxIndet 1.1s infinite ease-in-out;
        }
        @keyframes pptxIndet {
            0%   { margin-left: -35%; }
            100% { margin-left: 100%; }
        }
        #pptx-note {
            display: none;
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            max-width: 80%;
            padding: 8px 14px;
            background: rgba(184, 134, 11, 0.95);
            color: #fff;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
        }
        
        /* --- THUMBNAILS --- */
        #thumbnails-container {
            display: none;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, transparent, #000 20%, #000 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent, #000 20%, #000 80%, transparent 100%);
            padding: 20px 0;
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }
        
        #thumbnails-container::-webkit-scrollbar { 
            display: none; 
        }
        
        #thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        @media (max-width: 1200px) {
            #thumbnails-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .thumb-card {
            background: #111;
            border-radius: 6px;
            aspect-ratio: 16/9;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid transparent;
            transition: filter 0.2s, border-color 0.2s;
            position: relative;
        }
        .thumb-card:hover {
            filter: brightness(125%);
        }
        .thumb-card.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .thumb-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .thumb-number {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* --- CONTROLS --- */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: end;
            gap: 12px;
            background: transparent;
            padding: 10px 0;
            transition: all 0.3s ease;
        }

        #video-controls-row {
            display: none;
            padding-bottom: 0;
            gap: 8px;
        }

        /* Elevated Video Controls for Live Swap Mode */
        body.live-swap-active #video-controls-row {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        body.live-swap-active #video-controls-row.fade-out {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(20px);
        }
        body.live-swap-active #video-controls-row .btn-circle {
            background: rgba(255,255,255,0.9);
        }
        body.live-swap-active #video-controls-row .btn-circle:hover {
            background: #fff;
        }

        .btn-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #ddd;
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s, color 0.2s;
        }
        .btn-circle:not(#btn-blackout):not(#btn-blank){
            border: solid 2px rgba(255,255,255,.75);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0px 0px 20px #fff;
        }
        .btn-circle:hover { transform: scale(1.05); background: #eee; }
        .btn-circle:active { transform: scale(0.95); background: #fff; }
        
        .btn-circle svg{
            width: 20px;
            height: 20px;
            fill: #aaa;
            stroke: #aaa;
            transition: fill 0.2s, stroke 0.2s;
        }

        .btn-circle.active {
            background-color: #222;
        }
        .btn-circle.active svg {
            fill: #fff;
            stroke: #fff;
        }

        #btn-upload svg{
            transform:rotate(180deg)
        }

        #btn-blackout {
            background-image: linear-gradient(transparent, #000 75%);
            background-color: #888;
            border: 3px solid #000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #btn-blackout.active { background-color: #000; }
        
        #btn-blank {
            background-image: linear-gradient(#fff, transparent 50%);
            background-color: #eee;
            border: 3px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #btn-blank.active { background-color: #fff; border-color: #fff }

        /* --- LIVE VIEW (OBS/Receiver) --- */
        #live-view {
            display: none;
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 9999;
        }
        .live-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            inset: 0;
            display: none;
        }
        #live-overlay {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, background-color 0.5s ease;
            z-index: 10;
        }

        /* --- CLOCK --- */
        #clock-wrapper {
            height: 30px;
            width: 100%;
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 300;
            font-size: 25px;
            color: rgba(0,0,0,.25);
            transition: color .5s ease;
            cursor: pointer;
        }
        #clock-wrapper:hover { color: rgba(0,0,0,.75); }
        #clock-wrapper span { display: inline-block; }

        @keyframes digitFade {
            0% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        /* --- FOOTER --- */
        footer {
            margin: 0 0 15px auto;
            padding: 0 35px;
            font-size: 9px;
            color: #484848;
            text-align: right;
            background: transparent;
            opacity: .5;
            transition: opacity .5s ease;
        }
        footer:hover { opacity: 1; }
        footer a { color: #242424; text-decoration: none; font-weight: 500; transition: color .5s ease; }
        footer a:hover { color: #000; }
    </style>
</head>

                try {
                    if (typeof window.PptxViewJS === 'undefined') {

                        await viewer.render(offCanvas, { slideIndex: i, scale: 2, quality: 'high' });

                        if (settleAll || scan.hasChart[i]) {

                    const { w, h } = await imgSize(images[0]);
                    const orientation = w >= h ? 'landscape' : 'portrait';
                    const doc = new jsPDF({ orientation, unit: 'px', format: [w, h], compress: true });
                    for (let i = 0; i < images.length; i++) {
                        if (i > 0) doc.addPage([w, h], orientation);
                        doc.addImage(images[i], 'PNG', 0, 0, w, h);
                    }
                    convertedPdfBlob = doc.output('blob');
                    convertedPdfName = (file.name || 'presentation').replace(/\.pptx$/i, '') + '.pdf';
                    const pdfBytes = doc.output('arraybuffer');

                    hidePptxProgress();

                    // Hand the generated PDF to the standard pipeline.
                    currentFileName = convertedPdfName;
                    pageSource = 'pdf';
                    pdfjsLib.getDocument({ data: new Uint8Array(pdfBytes) }).promise.then(pdf => {

                        slideImages = []; // free rasterized frames; PDF drives rendering now
                        showSaveButton(true);

                        if (scan.emfCount > 0) showPptxNote(scan.emfCount);

                    i.onload = () => resolve({ w: i.naturalWidth || 1920, h: i.naturalHeight || 1080 });
                    i.onerror = () => resolve({ w: 1920, h: 1080 });

            // Pre-scan a PPTX zip for per-slide charts (presentation order) and EMF/WMF image count.
            async function scanPptx(file) {
                const result = { hasChart: [], emfCount: 0 };
                try {
                    if (typeof JSZip === 'undefined') return result;
                    const zip = await JSZip.loadAsync(await file.arrayBuffer());

                    // EMF/WMF images can't be decoded by pptxviewjs -> render blank.
                    Object.keys(zip.files).forEach(n => { if (/ppt\/media\/.*\.(emf|wmf)$/i.test(n)) result.emfCount++; });

                    const readStr = async (p) => { const f = zip.file(p); return f ? await f.async('string') : ''; };
                    const presXml = await readStr('ppt/presentation.xml');
                    const relsXml = await readStr('ppt/_rels/presentation.xml.rels');

                    // Slide order = <p:sldId r:id="rId..."> order in presentation.xml.
                    const rIds = [...presXml.matchAll(/<p:sldId[^>]*r:id="([^"]+)"/g)].map(m => m[1]);

                    // Map rId -> target (handle either attribute order).
                    const relMap = {};
                    for (const m of relsXml.matchAll(/<Relationship\b[^>]*Id="([^"]+)"[^>]*Target="([^"]+)"/g)) relMap[m[1]] = m[2];
                    for (const m of relsXml.matchAll(/<Relationship\b[^>]*Target="([^"]+)"[^>]*Id="([^"]+)"/g)) { if (!relMap[m[2]]) relMap[m[2]] = m[1]; }

                    for (const rId of rIds) {
                        const target = relMap[rId];
                        if (!target) { result.hasChart.push(true); continue; } // unknown -> settle to be safe
                        let path = target.replace(/^\//, '').replace(/^\.\.\//, 'ppt/');
                        if (!path.startsWith('ppt/')) path = 'ppt/' + path;
                        const slideName = path.split('/').pop();
                        const srXml = await readStr('ppt/slides/_rels/' + slideName + '.rels');
                        result.hasChart.push(/Target="[^"]*charts\//i.test(srXml));
                    }
                } catch (_e) {
                    return { hasChart: [], emfCount: result.emfCount }; // force settle-all on parse failure
                }
                return result;
            }

            function showPptxPreparing(msg) {

                if (!wrap) return;
                wrap.style.display = 'flex';
                if (track) track.classList.add('indeterminate');
                if (bar) bar.style.width = '';            // let the CSS animation drive it
                txt.textContent = msg || 'Preparing…';
                currentLabel.style.display = 'none';
            }

            // Progress bar shown during PPTX rasterization.
            function showPptxProgress(done, total, etaSec) {
                const wrap = document.getElementById('pptx-progress');
                const bar = document.getElementById('pptx-progress-bar');
                const txt = document.getElementById('pptx-progress-text');
                const track = document.getElementById('pptx-progress-track');
                if (!wrap) return;
                wrap.style.display = 'flex';
                if (track) track.classList.remove('indeterminate');
                const pct = total ? Math.round((done / total) * 100) : 0;
                bar.style.width = pct + '%';
                let line = 'Rendering slides ' + done + ' / ' + total;
                const eta = fmtEta(etaSec);
                if (eta) line += '  ·  ' + eta;
                txt.textContent = line;
                currentLabel.style.display = 'none';
            }

            function fmtEta(sec) {
                if (typeof sec !== 'number' || !isFinite(sec) || sec <= 0) return '';
                if (sec < 60) return '~' + Math.ceil(sec) + 's left';
                const m = Math.floor(sec / 60), s = Math.ceil(sec % 60);
                return '~' + m + 'm ' + s + 's left';
            }

            function hidePptxProgress() {
                const wrap = document.getElementById('pptx-progress');
                if (wrap) wrap.style.display = 'none';
            }

            // Draw a pre-rasterized PPTX slide onto a target canvas (matches PDF render signature).
            function drawSlideImage(num, canvasElement) {
                return new Promise((resolve) => {
                    const src = slideImages[num - 1];
                    if (!src) { resolve(); return; }
                    const img = new Image();
                    img.onload = () => {
                        canvasElement.width = img.width;
                        canvasElement.height = img.height;
                        canvasElement.getContext('2d').drawImage(img, 0, 0);
                        resolve();
                    };
                    img.onerror = () => resolve();
                    img.src = src;
                });
            }

            function initDocument() {
                pageNum = 1;
                currentCanvas.style.display = 'block';
                nextContainer.style.display = 'flex';
                buildThumbnails(); 
                queueRenderPage(pageNum); 
                renderThumbnailsBg(); 
            }

            // --- 2. RENDER LOGIC FOR PDF ---
            function renderPageCanvas(num, canvasElement) {
                if (pageSource === 'pptx') {
                    return drawSlideImage(num, canvasElement);
                }
                if (pdfDoc) {
                    return pdfDoc.getPage(num).then(page => {
                        const scale = 2.5; const viewport = page.getViewport({scale: scale});
                        canvasElement.height = viewport.height; canvasElement.width = viewport.width;
                        const ctx = canvasElement.getContext('2d');
                        return page.render({canvasContext: ctx, viewport: viewport}).promise;
                    });
                }
                return Promise.resolve();
            }

            function renderPage(num) {
                isRendering = true;
                
                renderPageCanvas(num, currentCanvas).then(() => {
                    currentLabel.style.display = 'none'; 
                    syncLiveWindow(); 
                    updateActiveThumbnail(num);
                    
                    if (num < totalPages) {
                        nextLabel.style.display = 'none';
                        renderPageCanvas(num + 1, nextCanvas).then(finishRender);
                    } else {
                        nextCanvas.getContext('2d').clearRect(0, 0, nextCanvas.width, nextCanvas.height);
                        nextLabel.textContent = "End of Document"; nextLabel.style.display = 'block';
                        finishRender();
                    }
                });
            }

            function finishRender() {
                isRendering = false;
                if (pageNumPending !== null) { renderPage(pageNumPending); pageNumPending = null; }
            }

            function queueRenderPage(num) {
                if (isRendering) pageNumPending = num;
                else renderPage(num);
            }

            function goNextPage() {
                if (mediaMode !== 'pdf' || totalPages === 0 || pageNum >= totalPages) return;
                pageNum++; queueRenderPage(pageNum);
            }

            function goPrevPage() {
                if (mediaMode !== 'pdf' || totalPages === 0 || pageNum <= 1) return;
                pageNum--; queueRenderPage(pageNum);
            }

            // --- THUMBNAIL LOGIC ---
            function buildThumbnails() {
                const grid = document.getElementById('thumbnails-grid'); grid.innerHTML = '';
                if (totalPages <= 2) { thumbsContainer.style.display = 'none'; return; }
                thumbsContainer.style.display = 'block';
                for(let i=1; i<=totalPages; i++) {
                    const card = document.createElement('div');
                    card.className = 'thumb-card'; card.id = 'thumb-card-' + i;
                    card.onclick = () => { pageNum = i; queueRenderPage(pageNum); };
                    const img = document.createElement('img'); img.id = 'thumb-img-' + i;
                    const numBadge = document.createElement('div');
                    numBadge.className = 'thumb-number'; numBadge.innerText = i;
                    card.appendChild(img); card.appendChild(numBadge); grid.appendChild(card);
                }
            }

            async function renderThumbnailsBg() {
                if (totalPages <= 2) return;
                if (pageSource === 'pptx') {
                    for(let i=1; i<=totalPages; i++) {
                        const img = document.getElementById('thumb-img-' + i);
                        if (img && slideImages[i-1]) { img.src = slideImages[i-1]; img.style.opacity = '1'; }
                    }
                    return;
                }
                if (mediaMode !== 'pdf') return; 
                for(let i=1; i<=totalPages; i++) {
                    await new Promise(r => setTimeout(r, 60));
                    if (!pdfDoc) break; 
                    
                    pdfDoc.getPage(i).then(page => {
                        const viewport = page.getViewport({scale: 0.25});
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width; canvas.height = viewport.height;
                        const ctx = canvas.getContext('2d');
                        page.render({canvasContext: ctx, viewport: viewport}).promise.then(() => {
                            const img = document.getElementById('thumb-img-' + i);
                            if (img) { img.src = canvas.toDataURL(); img.style.opacity = '1'; }
                        });
                    });
                }
            }

            function updateActiveThumbnail(num) {
                if (totalPages <= 2) return;
                document.querySelectorAll('.thumb-card').forEach(c => c.classList.remove('active'));
                const activeCard = document.getElementById('thumb-card-' + num);
                if (activeCard) {
                    activeCard.classList.add('active');
                    const offsetTop = activeCard.offsetTop - thumbsContainer.offsetTop;
                    thumbsContainer.scrollTo({ top: offsetTop - 10, behavior: 'smooth' });
                }
            }

            // --- 3. VIDEO SYNC CONTROLS ---
            currentVideo.addEventListener('play', () => {
                iconPlay.style.display = 'none'; iconPause.style.display = 'inline-block';
                bc.postMessage({ type: 'vid_play' });
                if(isLocalLiveMode) document.getElementById('live-video').play().catch(()=>{});
            });
            currentVideo.addEventListener('pause', () => {
                iconPause.style.display = 'none'; iconPlay.style.display = 'inline-block';
                bc.postMessage({ type: 'vid_pause' });
                if(isLocalLiveMode) document.getElementById('live-video').pause();
            });
            currentVideo.addEventListener('seeked', () => {
                bc.postMessage({ type: 'vid_seek', time: currentVideo.currentTime });
                if(isLocalLiveMode) document.getElementById('live-video').currentTime = currentVideo.currentTime;
            });

            btnVidPlay.addEventListener('click', () => { if (currentVideo.paused) currentVideo.play(); else currentVideo.pause(); });
            btnVidRestart.addEventListener('click', () => { currentVideo.currentTime = 0; currentVideo.play(); });
            btnVidLoop.addEventListener('click', () => {
                const isActive = btnVidLoop.classList.toggle('active');
                currentVideo.loop = isActive; bc.postMessage({ type: 'vid_loop', loop: isActive });
                if(isLocalLiveMode) document.getElementById('live-video').loop = isActive;
            });
            btnVidMute.addEventListener('click', () => {
                liveVideoMuted = !liveVideoMuted;
                if (liveVideoMuted) {
                    iconUnmute.style.display = 'none'; iconMute.style.display = 'inline-block';
                } else {
                    iconUnmute.style.display = 'inline-block'; iconMute.style.display = 'none';
                }
                bc.postMessage({ type: 'vid_mute', muted: liveVideoMuted });
                if(isLocalLiveMode) document.getElementById('live-video').muted = liveVideoMuted;
            });

            // --- 4. LIVE POPUP & IPC LOGIC ---
            function openLiveWindow() {
                // Strip existing queries/hashes and append ?mode=live safely
                let targetUrl = window.location.href.split(/[?#]/)[0] + '?mode=live';
                liveWindow = window.open(targetUrl, 'PlayDF_Live', 'width=1280,height=720,menubar=no,toolbar=no,location=no,status=no,resizable=yes');
            }

            function syncLiveWindow() {
                if (mediaMode === 'none') return;

                // Post synchronously. Callers already invoke this after the source is ready
                // (renderPage runs it post-render; a freshly opened popup pulls state via
                // its own 'request_state' handshake), so no arbitrary delay is needed.
                let payload = { fileName: currentFileName };

                if (mediaMode === 'pdf') {
                    payload.type = 'render_pdf'; payload.data = currentCanvas.toDataURL('image/png');
                } else if (mediaMode === 'image') {
                    payload.type = 'render_image'; payload.file = currentFileObject;
                } else if (mediaMode === 'video') {
                    payload.type = 'render_video'; payload.file = currentFileObject; payload.muted = liveVideoMuted;
                }

                bc.postMessage(payload);

                // Local Live Mapping
                if (isLocalLiveMode) {
                    const lCanvas = document.getElementById('live-canvas'); const lImg = document.getElementById('live-img');
                    const lVideo = document.getElementById('live-video');

                    if (mediaMode === 'pdf') {
                        lVideo.pause(); lVideo.style.display = 'none'; lImg.style.display = 'none';
                        lCanvas.style.display = 'block';
                        const imgObj = new Image(); imgObj.onload = () => { lCanvas.width = imgObj.width; lCanvas.height = imgObj.height; lCanvas.getContext('2d').drawImage(imgObj, 0, 0); };
                        imgObj.src = payload.data;
                    } else if (mediaMode === 'image') {
                        lVideo.pause(); lVideo.style.display = 'none'; lCanvas.style.display = 'none';
                        lImg.style.display = 'block'; lImg.src = objectUrlTracker;
                    } else if (mediaMode === 'video') {
                        lCanvas.style.display = 'none'; lImg.style.display = 'none';
                        lVideo.style.display = 'block';
                        if (lVideo.src !== objectUrlTracker) {
                            lVideo.src = objectUrlTracker; lVideo.load(); 
                            lVideo.loop = currentVideo.loop; 
                            lVideo.muted = liveVideoMuted;
                            lVideo.currentTime = currentVideo.currentTime;
                            if (!currentVideo.paused) lVideo.play().catch(()=>{});
                        }
                    }
                }
            }

            function toggleOverlay(type) {
                if (overlayState === type) overlayState = 'none'; else overlayState = type; 
                btnBlackout.classList.toggle('active', overlayState === 'black'); btnBlank.classList.toggle('active', overlayState === 'white');
                applyOverlayState();
            }

            function applyOverlayState() {
                bc.postMessage({ type: 'overlay', state: overlayState });
                const liveOverlay = document.getElementById('live-overlay');
                if (overlayState === 'black') {
                    liveOverlay.style.backgroundColor = '#000'; liveOverlay.style.opacity = '1'; liveOverlay.style.pointerEvents = 'auto';
                } else if (overlayState === 'white') {
                    liveOverlay.style.backgroundColor = '#fff'; liveOverlay.style.opacity = '1'; liveOverlay.style.pointerEvents = 'auto';
                } else {
                    liveOverlay.style.opacity = '0'; liveOverlay.style.pointerEvents = 'none';
                }
            }

            function toggleFullScreen() { bc.postMessage({ type: 'command_fullscreen' }); }
            
            function toggleLocalLive() {
                isLocalLiveMode = !isLocalLiveMode;
                const liveView = document.getElementById('live-view');
                document.body.classList.toggle('live-swap-active', isLocalLiveMode);
                
                if (isLocalLiveMode) {
                    liveView.style.background = '#000'; liveView.style.display = 'block';
                    syncLiveWindow(); applyOverlayState();
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
                    if (mediaMode === 'video') resetHideControlsTimer();
                } else {
                    liveView.style.display = 'none';
                    videoControlsRow.classList.remove('fade-out');
                    clearTimeout(hideControlsTimeout);
                    if (mediaMode === 'video' && !currentVideo.paused) {
                        currentVideo.pause();
                        document.getElementById('live-video').pause();
                    }
                    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
                }
            }

            // --- 5. GLOBAL KEYBOARD & CLICK HANDLERS ---
            
            function resetHideControlsTimer() {
                if (!isLocalLiveMode || mediaMode !== 'video') return;
                videoControlsRow.classList.remove('fade-out');
                clearTimeout(hideControlsTimeout);
                hideControlsTimeout = setTimeout(() => {
                    if (isLocalLiveMode && mediaMode === 'video') {
                        videoControlsRow.classList.add('fade-out');
                    }
                }, 5000);
            }

            document.addEventListener('mousemove', resetHideControlsTimer);
            videoControlsRow.addEventListener('mouseenter', () => clearTimeout(hideControlsTimeout));
            videoControlsRow.addEventListener('mouseleave', resetHideControlsTimer);
            
            // Advance PDF via clicks on Live Swap canvas
            const liveViewEl = document.getElementById('live-view');
            liveViewEl.addEventListener('click', (e) => {
                // Ensure we do not advance the page if interacting with the floating video controls
                if (e.target.closest('#video-controls-row')) return;
                
                if (isLocalLiveMode && mediaMode === 'pdf') {
                    goNextPage();
                }
            });

            nextContainer.addEventListener('click', goNextPage);
            btnSwap.addEventListener('click', toggleLocalLive);
            btnPresent.addEventListener('click', openLiveWindow);
            btnBlackout.addEventListener('click', () => toggleOverlay('black'));
            btnBlank.addEventListener('click', () => toggleOverlay('white'));

            function handleKeydown(e, isPopup = false) {
                if(e && e.target && e.target.tagName) { if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return; }
                if (mediaMode === 'none') return;
                const k = e.key;
                
                if (['a', 'A', ' ', 'ArrowDown', 'ArrowRight'].includes(k)) {
                    if (mediaMode === 'pdf') { if (e.preventDefault) e.preventDefault(); goNextPage(); }
                    else if (mediaMode === 'video' && k === ' ') { if (e.preventDefault) e.preventDefault(); if (currentVideo.paused) currentVideo.play(); else currentVideo.pause(); }
                } 
                else if (['ArrowUp', 'ArrowLeft'].includes(k)) {
                    if (mediaMode === 'pdf') { if (e.preventDefault) e.preventDefault(); goPrevPage(); }
                }
                else if (['p', 'P'].includes(k) && !isPopup) { if (e.preventDefault) e.preventDefault(); openLiveWindow(); }
                else if (['z', 'Z'].includes(k)) { if (e.preventDefault) e.preventDefault(); toggleOverlay('black'); }
                else if (['x', 'X'].includes(k)) { if (e.preventDefault) e.preventDefault(); toggleOverlay('white'); }
                else if (['o', 'O'].includes(k)) { if (e.preventDefault) e.preventDefault(); fileInput.click(); }
                else if (['s', 'S'].includes(k)) { if (convertedPdfBlob) { if (e.preventDefault) e.preventDefault(); saveConvertedPdf(); } }
                else if (['1'].includes(k)) { if (e.preventDefault) e.preventDefault(); toggleLocalLive(); }
                else if (['f', 'F'].includes(k)) { if (e.preventDefault) e.preventDefault(); toggleFullScreen(); }
                else if (['r', 'R'].includes(k)) {
                    if (e.preventDefault) e.preventDefault(); bc.postMessage({ type: 'command_close' }); window.location.reload(); 
                }
            }
            document.addEventListener('keydown', (e) => handleKeydown(e, false));
            document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement && isLocalLiveMode) toggleLocalLive(); });
        }
    </script>
</body>
</html>
